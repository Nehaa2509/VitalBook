<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out — VitalBook Admin</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0B2B46 0%, #1a3a5c 45%, #2d1b69 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle decorative plus pattern (matching the rest of the site) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
        }
        .blob-1 { width: 500px; height: 500px; background: #FF8C00; top: -180px; right: -120px; }
        .blob-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -150px; left: -100px; }

        /* ── Floating Card ── */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 52px 44px 44px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.28),
                0 4px 16px rgba(0, 0, 0, 0.12);
            position: relative;
            animation: floatIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1);    }
        }

        /* ── Icon badge ── */
        .icon-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff7ed, #ffedd5);
            border: 2px solid rgba(255, 140, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon-ring i {
            font-size: 34px;
            background: linear-gradient(135deg, #FF8C00, #e07000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Logo ── */
        .logo-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }
        .logo-line i { color: #FF8C00; font-size: 18px; }
        .logo-line span {
            font-size: 20px;
            font-weight: 800;
            color: #0B2B46;
            letter-spacing: -0.3px;
        }

        /* ── Heading ── */
        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0B2B46;
            margin-bottom: 12px;
            letter-spacing: -0.4px;
        }

        /* ── Subtext ── */
        .subtitle {
            font-size: 15px;
            color: #6B7280;
            line-height: 1.7;
            margin-bottom: 36px;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── CTA Button ── */
        .btn-login {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            background: linear-gradient(135deg, #FF8C00, #e07000);
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(255, 140, 0, 0.40);
            transition: all 0.25s ease;
            margin-bottom: 20px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px rgba(255, 140, 0, 0.50);
            background: linear-gradient(135deg, #ff9a1a, #FF8C00);
            color: #ffffff;
            text-decoration: none;
        }
        .btn-login:active { transform: translateY(-1px); }

        /* ── Footer note ── */
        .footer-note {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }
        .footer-note a {
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-note a:hover { color: #0B2B46; text-decoration: underline; }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: #f1f5f9;
            margin: 28px 0 22px;
        }

        .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #9ca3af;
        }
        .secure-badge i { color: #22c55e; font-size: 12px; }
    </style>
</head>
<body>

    <!-- Background decorations -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Floating Card -->
    <div class="card">

        <!-- Logo -->
        <div class="logo-line">
            <i class="fas fa-plus-square"></i>
            <span>VitalBook</span>
        </div>

        <!-- Icon -->
        <div class="icon-ring">
            <i class="fas fa-sign-out-alt"></i>
        </div>

        <!-- Heading -->
        <h1>You've been signed out</h1>

        <!-- Subtext -->
        <p class="subtitle">
            Thanks for using VitalBook. You've been securely logged out of the admin panel.
            See you next time! 👋
        </p>

        <!-- Platform Stats -->
        <div style="display: flex; justify-content: center; gap: 24px; margin-bottom: 32px;">
            <div style="text-align: center;">
                <div style="font-size: 22px; font-weight: 800; color: #0B2B46;">12+</div>
                <div style="font-size: 11px; color: #6B7280;">Doctors</div>
            </div>
            <div style="width: 1px; background: #f1f5f9;"></div>
            <div style="text-align: center;">
                <div style="font-size: 22px; font-weight: 800; color: #0B2B46;">25+</div>
                <div style="font-size: 11px; color: #6B7280;">Patients</div>
            </div>
            <div style="width: 1px; background: #f1f5f9;"></div>
            <div style="text-align: center;">
                <div style="font-size: 22px; font-weight: 800; color: #0B2B46;">100+</div>
                <div style="font-size: 11px; color: #6B7280;">Appointments</div>
            </div>
            <div style="width: 1px; background: #f1f5f9;"></div>
            <div style="text-align: center;">
                <div style="font-size: 22px; font-weight: 800; color: #0B2B46;">6</div>
                <div style="font-size: 11px; color: #6B7280;">Specializations</div>
            </div>
        </div>

        <!-- CTA Button -->
        <a href="/admin/" class="btn-login">
            <i class="fas fa-arrow-right"></i>
            Log In Again
        </a>

        <div class="divider"></div>

        <div class="footer-note">
            Not an admin?
            <a href="/">Return to VitalBook Home</a>
        </div>

        <br>
        <div class="secure-badge">
            <i class="fas fa-shield-alt"></i>
            Session securely terminated
        </div>

    </div>

</body>
</html>
